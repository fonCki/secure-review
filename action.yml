name: 'Secure Review'
description: 'Multi-model static security review on pull requests: LLM reviewers + SAST, with inline PR comments on changed lines.'
author: 'Alfonso Pedro Ridao'
branding:
  icon: 'shield'
  color: 'red'
inputs:
  config:
    description: 'Path to .secure-review.yml'
    required: false
    default: '.secure-review.yml'
  mode:
    description: 'Static review only. `fix` is a deprecated alias for `review` (multi-model audit + PR comments). For live target probes, ZAP, or Nuclei, use the `secure-review-runtime` package instead.'
    required: false
    default: 'review'
  max-cost-usd:
    description: 'Cost ceiling for AI-backed static review (reviewers + writer if used elsewhere).'
    required: false
    default: '20'
runs:
  using: 'node20'
  main: 'dist-action/index.js'
