name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build library
        run: pnpm build

      - name: Build Action bundle
        run: pnpm build:action

      - name: Verify dist-action is up-to-date
        run: |
          if ! git diff --quiet dist-action/; then
            echo "::error::dist-action/ is out of date. Run 'pnpm build:action' and commit the result."
            git diff dist-action/
            exit 1
          fi
