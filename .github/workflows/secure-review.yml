name: Secure Review

on: pull_request

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  review:
    runs-on: ubuntu-latest
    # Fork PRs don't get access to secrets — the reviewer would no-op. Owners
    # who want to review fork PRs should switch to pull_request_target with
    # an explicit approval gate.
    if: github.event.pull_request.head.repo.fork == false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Install Semgrep so the SAST layer actually runs on the runner.
      # Without this, semgrep silently skips and only AI reviewers + npm audit
      # contribute to findings.
      - name: Install Semgrep
        run: pip install semgrep
        shell: bash

      - uses: fonCki/secure-review@v1
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY:    ${{ secrets.GOOGLE_API_KEY }}
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
